<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>腾讯云翻译助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <h1>翻译助手</h1>
      <div class="toggle-container">
        <label class="toggle">
          <input type="checkbox" id="enabledToggle" checked>
          <span class="toggle-slider"></span>
        </label>
        <span id="toggleLabel">已启用</span>
      </div>
    </div>

    <div class="popup-quick-translate">
      <div class="input-group">
        <textarea id="inputText" placeholder="输入要翻译的文本..." rows="3"></textarea>
        <div class="lang-select">
          <select id="sourceLang">
            <option value="auto">自动检测</option>
            <option value="en">英语</option>
            <option value="zh">中文</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
          </select>
          <span class="arrow">→</span>
          <select id="targetLang">
            <option value="zh">中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
          </select>
        </div>
        <button id="translateBtn" class="btn btn-primary">翻译</button>
      </div>
      <div id="outputText" class="output-area">
        <span class="placeholder">翻译结果将显示在这里</span>
      </div>
    </div>

    <div class="popup-footer">
      <a href="#" id="settingsLink">设置</a>
      <span class="version">v1.0.0</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
